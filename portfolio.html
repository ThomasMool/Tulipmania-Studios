<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio - Tulipmania Studios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/image4.png">
</head>
<body>

<!-- NAVIGATION -->
<nav>
  <div class="nav-logo-top">
    <!-- Gecorrigeerd met class="logo-link" voor de gecentreerde hover-balk -->
    <a href="index.html" class="logo-link">
      <img src="images/image4.png" alt="Tulipmania Studios Logo">
    </a>
  </div>

  <div class="hamburger" onclick="toggleNav()">&#9776;</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="portfolio.html" class="active">Portfolio</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- BACKGROUND HERO -->
<section id="hero">
  <div class="hero-slide">
    <!-- Inline style vervangen door class="active" conform de CSS -->
    <img src="images/image3.jpg" alt="Portfolio Background" class="active">
  </div>
</section>

<!-- MAIN CONTENT -->
<main class="portfolio-page-layout">
  
  <a href="https://www.youtube.com/watch?v=YOUR_VIDEO_ID" target="_blank" class="featured-video-hero">
    <img src="images/image5.png" alt="Featured Project - Watch on YouTube">
    
    <div class="hero-hover-image">
      <img src="images/image6.png" alt="Project Details">
    </div>

    <div class="play-overlay-hint"></div>
  </a>

</main>

<!-- MOBILE NAV SCRIPT -->
<script>
function toggleNav() {
  document.querySelector('.nav-links').classList.toggle('show');
}
</script>
</body>
</html>
