<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <style>

    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* NAVIGATION */
    nav {
      width: 200px;
      height: 100vh;
      background: black;
      position: fixed;
      left: 0;
      top: 0;
      padding: 30px;
      box-sizing: border-box;
    }

    nav a {
      display: block;
      color: white;
      text-decoration: none;
      margin-bottom: 20px;
    }

    /* PAGE CONTENT */
    main {
      margin-left: 220px;
      padding: 40px;
    }

    /* SMALL TOP IMAGE */
    .portfolio-banner img {
      width: 300px;
      height: auto;
      display: block;
      border-radius: 12px;
      margin-bottom: 40px;
    }

    /* GALLERY */
    .portfolio-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    /* SMALL GALLERY IMAGES */
    .portfolio-gallery img {
      width: 200px;
      height: 140px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
    }

  </style>
</head>

<body>

<nav>
  <a href="#">Home</a>
  <a href="#">Portfolio</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<main>

  <section class="portfolio-banner">
    <img src="images/image3.jpg" alt="">
  </section>

  <section class="portfolio-gallery">
    <img src="images/image1.jpg" alt="">
    <img src="images/image2.jpg" alt="">
    <img src="images/image3.jpg" alt="">
    <img src="images/image4.jpg" alt="">
  </section>

</main>

</body>
</html>
