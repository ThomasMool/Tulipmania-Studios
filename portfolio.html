<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio - Tulipmania Studios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <a href="index.html" class="nav-title">TULIPMANIA STUDIOS</a>

  <div class="hamburger" onclick="toggleNav()">
    &#9776;
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="portfolio.html" class="active">Portfolio</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- Pinned Logo Container -->
  <div class="nav-logo">
    <img src="images/image4.png" alt="Tulipmania Studios Logo">
  </div>
</nav>

<main class="inner-page">
  <!-- Sub-page Banner Layer -->
  <section id="hero">
    <div class="hero-slide">
      <img src="images/image3.jpg" alt="Portfolio Background" style="opacity: 1;">
    </div>
  </section>

  <!-- Interactive Portfolio Workspace -->
  <div class="portfolio-gallery">
    <!-- CLICKABLE VIDEO CARD: Points to YouTube with popup hover behavior -->
    <a href="https://www.youtube.com/watch?v=YOUR_VIDEO_ID" target="_blank" class="video-card">
      <img src="images/image5.png" alt="Featured Project - Watch on YouTube">
    </a>
    
    <!-- Additional grid items can be placed here using the same structure -->
  </div>
</main>

<!-- MOBILE NAV SCRIPT -->
<script>
function toggleNav() {
  document.querySelector('.nav-links').classList.toggle('show');
}
</script>

</body>
</html>
