<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio - Tulipmania Studios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <a href="index.html" class="nav-title">TULIPMANIA STUDIOS</a>

  <div class="hamburger" onclick="toggleNav()">
    &#9776;
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="portfolio.html" class="active">Portfolio</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- Pinned Logo Container -->
  <div class="nav-logo">
    <img src="images/image4.png" alt="Tulipmania Studios Logo">
  </div>
</nav>

<!-- FULL SCREEN BACKGROUND IMAGE LAYER -->

<section id="hero">
  <div class="hero-slide">
    <img src="images/image3.jpg" alt="Portfolio Background" style="opacity: 1;">
  </div>
</section>

<!-- MAIN CONTENT LAYER LAYER -->
<main class="portfolio-page-layout">
  <!-- TOP THIRD FEATURED CARD -->
  <a href="https://www.youtube.com/watch?v=YOUR_VIDEO_ID" target="_blank" class="featured-video-hero">
    <img src="images/image1.jpg" alt="Featured Project - Watch on YouTube">
    <div class="play-overlay-hint">WATCH FILM</div>
  </a>
</main>

<!-- MOBILE NAV SCRIPT -->
<script>
function toggleNav() {
  document.querySelector('.nav-links').classList.toggle('show');
}
</script>

</html>
