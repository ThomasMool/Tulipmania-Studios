<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Tulipmania Studios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/image4.png">
</head>
<body>

<nav>
  <div class="nav-logo-top">
    <a href="index.html" class="logo-link">
      <img src="images/image4.png" alt="Tulipmania Studios Logo">
    </a>
  </div>

  <div class="hamburger" onclick="toggleNav()">&#9776;</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="about.html">About Us</a>
    <a href="contact.html" class="active">Contact</a>
  </div>
</nav>

<section id="hero">
  <div class="hero-slide">
    <img src="images/image13.jpg" alt="Contact Background" class="active">
  </div>
</section>

<main class="inner-page">
  <div class="about-text-panel">
    <h2 class="underline-accent">Get in Touch</h2>
    <p>
      Have a project in mind, want to collaborate, or just want to say hello? We would love to hear from you. Drop us a line and let's create something beautiful together.
    </p>
    
    <div class="contact-details" style="margin-top: 40px;">
      <h3 style="font-family: 'Lexend Exa', sans-serif; color: #ffedfe; font-size: 16px; margin-bottom: 10px; text-transform: uppercase;">Email Us</h3>
      <p style="margin-bottom: 25px;">
        <a href="mailto:info@tulipmaniastudios.com" class="contact-email-link">info@tulipmaniastudios.com</a>
      </p>

      <h3 style="font-family: 'Lexend Exa', sans-serif; color: #ffedfe; font-size: 16px; margin-bottom: 10px; text-transform: uppercase;">Follow Us</h3>
      <p>
        <a href="https://instagram.com/JOUW_GEBRUIKERSNAAM" target="_blank" class="contact-social-link">@tulipmaniastudios</a>
      </p>
    </div>
  </div>
</main>

<script>
function toggleNav() {
  document.querySelector('.nav-links').classList.toggle('show');
}
</script>
</body>
</html>
