<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tulipmania Studios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/image4.png">

  <style>
    /* ========================================================
       DESKTOP NAVIGATION TEXT POSITIONING
       ======================================================== */
    @media (min-width: 769px) {
      .nav-logo-text {
        /* LEFT/RIGHT POSITION: Distance from the logo icon graphic */
        margin-left: 10px !important; 
        
        /* UP/DOWN POSITION: Centers the text nicely on desktop views */
        margin-top: 70px !important; 
        display: inline-block !important;
      }
    }

    /* ========================================================
       MOBILE NAVIGATION & HERO TEXT ADJUSTMENTS
       ======================================================== */
    @media (max-width: 768px) {
      /* Prevents the desktop margin rules from ruining the mobile layout */
      .nav-logo-text { 
        display: none !important; 
        margin-top: 0 !important; 
        margin-left: 0 !important; 
      }

      .hero-text {
        top: 45% !important; 
        left: 50% !important; 
        transform: translate(-50%, -50%) !important; 
      }

      .hero-text h2 {
        font-size: 1.2rem !important;
        line-height: 1.4 !important;
      }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo-top">
    <a href="index.html" class="logo-link">
      <img src="images/image4.png" alt="Tulipmania Studios Logo">
      <span class="nav-logo-text" style="font-family: 'Courier New', Courier, monospace;">
          - Dutch filmmakers
      </span>
    </a>
  </div>

  <div class="hamburger" onclick="toggleNav()">&#9776;</div>
  <div class="nav-links">
    <a href="index.html" class="active">Home</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<main>
  <section id="hero">
    <div class="hero-slide">
      <img src="images/image5.png" alt="Hero 1">
      <img src="images/image8.png" alt="Hero 2">
      <img src="images/image11.png" alt="Hero 3">
      <img src="images/image3.jpg" alt="Hero 4">
      <img src="images/image9.png" alt="Hero 5">
      <img src="images/image12.png" alt="Hero 6">
    </div>
  </section>

  <div class="hero-text">
    <h2>Passionate About Film.<br>Maniacally So.</h2>
  </div>
</main>
  
<script>
function toggleNav() {
  document.querySelector('.nav-links').classList.toggle('show');
}
</script>

<script>
const slides = document.querySelectorAll('.hero-slide img');
let current = 0;
const delay = 6000;

function showSlide(index) {
  slides.forEach((img, i) => {
    img.classList.toggle('active', i === index);
  });
}

function nextSlide() {
  current = (current + 1) % slides.length;
  showSlide(current);
}

showSlide(current);
setInterval(nextSlide, delay);
</script>
</body>
</html>
