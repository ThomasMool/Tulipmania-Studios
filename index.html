<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tulipmania Studios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Pinstripe&display=swap" rel="stylesheet">
</head>
<body>

<nav>
  <a href="index.html" class="nav-title">TULIPMANIA STUDIOS</a>
  <div class="hamburger" onclick="toggleNav()">&#9776;</div>
  <div class="nav-links">
    <a href="index.html" class="active">Home</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<section id="hero">
  <div class="hero-slide">
    <img src="images/image1.jpg" alt="Hero 1">
    <img src="images/image3.jpg" alt="Hero 3">
  </div>
  <div class="hero-text">
    <h2>Passionate about films. Maniacally passionate.</h2>
  </div>
</section>
  
<script>
function toggleNav() {
  document.querySelector('.nav-links').classList.toggle('show');
}
</script>

<script>
const slides = document.querySelectorAll('.hero-slide img');
let current = 0;
const delay = 5000; // 5 seconds

function showSlide(index) {
  slides.forEach((img, i) => {
    img.classList.toggle('active', i === index);
  });
}

function nextSlide() {
  current = (current + 1) % slides.length;
  showSlide(current);
}

showSlide(current);
setInterval(nextSlide, delay);
</script>
</body>
</html>
